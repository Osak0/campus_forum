<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XJTU 校园论坛</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="navbar">
        <a href="index.html" style="text-decoration:none;"><h1>交个朋友</h1></a>
        <div id="auth-buttons"></div>
    </div>

    <div class="container" style="max-width: 800px; margin: 20px auto;">
        <!-- 板块导航 -->
        <div id="boards-nav" class="boards-nav" style="margin-bottom: 16px;"></div>

        <h2 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <span id="page-title">最新动态</span>
        </h2>

        <!-- 搜索区 -->
        <div style="display:flex; gap:10px; margin-bottom: 12px;">
            <input id="search-input" type="text" placeholder="搜索标题或内容关键词..." style="margin-bottom:0;">
            <button class="btn btn-secondary" onclick="searchPosts()">搜索</button>
            <button class="btn btn-secondary" onclick="clearSearch()">清空</button>
        </div>

        <!-- 热门搜索 -->
        <div id="trending-container" style="margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;">
            <span style="color: #888; font-size: 0.85em;">热门搜索:</span>
        </div>

        <!-- 标签筛选 -->
        <div style="margin-bottom: 12px;">
            <button class="btn btn-secondary btn-sm" onclick="toggleTags()">折叠/展开标签</button>
            <div id="tag-filter-container" style="margin-top: 10px; display:flex; flex-wrap:wrap; gap:8px;"></div>
        </div>

        <!-- 折叠模式切换 -->
        <div id="collapse-hint" style="margin-bottom: 12px; display: none;">
            <small style="color: #888;">💡 非关注标签的帖子已折叠，点击标题展开</small>
        </div>
         
        <!-- 这里的内容由 index.js 动态填充 -->
        <div id="posts-container">
            <p style="text-align:center; color:#888;">正在加载...</p>
        </div>
    </div>

    <!-- 引入脚本 -->
    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
